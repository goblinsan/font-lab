<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>font-lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 { font-size: 1.4rem; letter-spacing: 0.05em; }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 720px) {
      main { grid-template-columns: 1fr; }
    }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      padding: 1.5rem;
    }

    .card h2 { font-size: 1rem; margin-bottom: 1rem; color: #333; }

    label { display: block; font-size: .85rem; color: #555; margin-bottom: .25rem; margin-top: .75rem; }

    input[type="text"], input[type="file"], textarea, select {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d0cfc8;
      border-radius: 6px;
      font-size: .9rem;
      background: #fafaf8;
    }

    input[type="file"] { padding: .35rem; }

    textarea { min-height: 70px; resize: vertical; }

    button[type="submit"] {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: .65rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .95rem;
      cursor: pointer;
      transition: background .15s;
    }

    button[type="submit"]:hover { background: #2e2e52; }

    #msg {
      margin-top: .75rem;
      font-size: .85rem;
      min-height: 1.2em;
    }

    #msg.ok  { color: #2a7a3b; }
    #msg.err { color: #c0392b; }

    /* Gallery */
    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
      margin-bottom: 1rem;
    }

    .filters input, .filters select {
      padding: .45rem .7rem;
      border: 1px solid #d0cfc8;
      border-radius: 6px;
      font-size: .85rem;
      background: #fafaf8;
      width: 100%;
    }

    .filters .filter-row-full {
      grid-column: 1 / -1;
    }

    .filters button {
      grid-column: 1 / -1;
      padding: .45rem .9rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      cursor: pointer;
    }

    .filters button:hover { background: #2e2e52; }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .sample-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: box-shadow .15s, transform .12s;
    }

    .sample-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.13);
      transform: translateY(-2px);
    }

    .sample-card img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #eee;
    }

    .sample-card .meta {
      padding: .6rem .75rem;
    }

    .sample-card .meta strong { font-size: .85rem; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sample-card .meta span  { font-size: .75rem; color: #777; }

    .sample-card .taxonomy-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      margin-top: 4px;
    }

    .badge {
      display: inline-block;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: .68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .badge-style { background: #ddeeff; color: #1a4a8a; }
    .badge-theme { background: #ffeedd; color: #8a4a1a; }
    .badge-cat   { background: #eeffdd; color: #2a6a1a; }

    .sample-card .tag {
      display: inline-block;
      background: #e8e7f5;
      color: #3a3a7a;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: .7rem;
      margin: 2px 2px 0 0;
    }

    .sample-card .del-btn {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(0,0,0,.45);
      color: #fff;
      border: none;
      border-radius: 4px;
      width: 22px; height: 22px;
      font-size: .75rem;
      cursor: pointer;
      line-height: 22px;
      text-align: center;
      display: none;
    }

    .sample-card .seg-btn {
      position: absolute;
      top: 4px; left: 4px;
      background: rgba(26,26,46,.75);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: .7rem;
      cursor: pointer;
      display: none;
    }

    .sample-card:hover .del-btn,
    .sample-card:hover .seg-btn { display: block; }

    .empty { color: #999; font-size: .9rem; text-align: center; padding: 2rem 0; }

    /* ------------------------------------------------------------------ */
    /* Specimen view overlay                                               */
    /* ------------------------------------------------------------------ */

    #specimen-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 90;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    #specimen-overlay.open { display: block; }

    #specimen-panel {
      background: #fff;
      border-radius: 12px;
      max-width: 860px;
      margin: 0 auto;
      padding: 1.75rem;
      position: relative;
    }

    #specimen-panel h2 {
      font-size: 1.3rem;
      margin-bottom: .2rem;
    }

    #specimen-panel .sp-meta {
      font-size: .82rem;
      color: #666;
      margin-bottom: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
      align-items: center;
    }

    #specimen-img {
      width: 100%;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      margin-bottom: 1.25rem;
    }

    #specimen-glyphs-section h3 {
      font-size: .9rem;
      color: #555;
      margin-bottom: .75rem;
    }

    #specimen-glyph-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      gap: .5rem;
    }

    .sp-glyph-tile {
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: .4rem;
      text-align: center;
    }

    .sp-glyph-tile.verified { border-color: #27ae60; }

    .sp-glyph-tile img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #fff;
      border-radius: 3px;
      margin-bottom: .25rem;
      image-rendering: pixelated;
    }

    .sp-glyph-tile .sp-label {
      font-size: .75rem;
      color: #444;
      font-weight: 600;
    }

    #specimen-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #555;
      line-height: 1;
    }

    #sp-open-seg-btn {
      padding: .45rem .9rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      cursor: pointer;
      margin-bottom: 1.25rem;
    }

    #sp-open-seg-btn:hover { background: #2e2e52; }

    #sp-action-bar {
      display: flex;
      gap: .6rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    #sp-action-bar button {
      padding: .45rem .9rem;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      cursor: pointer;
      background: #1a1a2e;
      color: #fff;
    }

    #sp-action-bar button:hover { background: #2e2e52; }

    /* ------------------------------------------------------------------ */
    /* Compare overlay (Issue #19)                                         */
    /* ------------------------------------------------------------------ */

    #compare-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 110;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    #compare-overlay.open { display: block; }

    #compare-panel {
      background: #fff;
      border-radius: 12px;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.75rem;
      position: relative;
    }

    #compare-panel h2 { font-size: 1.1rem; margin-bottom: .2rem; }

    #compare-panel .subtitle { font-size: .8rem; color: #888; margin-bottom: 1.25rem; }

    #compare-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #555;
      line-height: 1;
    }

    #compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
    }

    .cmp-tile {
      background: #f8f8f8;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: .6rem;
      text-align: center;
    }

    .cmp-tile.verified { border-color: #27ae60; }

    .cmp-row {
      display: flex;
      gap: .5rem;
      margin-bottom: .4rem;
    }

    .cmp-half {
      flex: 1;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #eee;
      overflow: hidden;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cmp-half img, .cmp-half object {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .cmp-col-labels {
      display: flex;
      gap: .5rem;
      font-size: .65rem;
      color: #999;
      margin-bottom: .4rem;
    }

    .cmp-col-labels span { flex: 1; text-align: center; }

    .cmp-label {
      font-size: .8rem;
      font-weight: 600;
      color: #333;
    }

    .cmp-empty { color: #999; font-size: .9rem; text-align: center; padding: 2rem 0; }

    /* ------------------------------------------------------------------ */
    /* Spacing controls in glyph tile (Issue #20)                         */
    /* ------------------------------------------------------------------ */

    .spacing-row {
      display: flex;
      gap: .3rem;
      margin-top: .3rem;
    }

    .spacing-row label {
      font-size: .65rem;
      color: #888;
      margin: 0 0 .1rem;
    }

    .spacing-field {
      flex: 1;
    }

    .spacing-field input[type="number"] {
      width: 100%;
      padding: .2rem .3rem;
      font-size: .78rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
      background: #fff;
    }

    #correction-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1rem;
    }

    #correction-overlay.open { display: block; }

    #correction-panel {
      background: #fff;
      border-radius: 12px;
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
      position: relative;
    }

    #correction-panel h2 {
      font-size: 1.1rem;
      margin-bottom: .25rem;
    }

    #correction-panel .subtitle {
      font-size: .8rem;
      color: #888;
      margin-bottom: 1.25rem;
    }

    #correction-close {
      position: absolute;
      top: 1rem; right: 1rem;
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #555;
      line-height: 1;
    }

    #source-img-wrap {
      position: relative;
      display: inline-block;
      max-width: 100%;
      margin-bottom: 1.25rem;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }

    #source-img-wrap img {
      display: block;
      max-width: 100%;
    }

    /* Bounding-box overlays on the source image */
    .bbox-overlay {
      position: absolute;
      border: 2px solid #e74c3c;
      border-radius: 2px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .bbox-overlay.verified { border-color: #27ae60; }
    .bbox-overlay:hover { border-color: #f39c12; }

    #glyph-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: .75rem;
    }

    .glyph-tile {
      background: #f8f8f8;
      border: 2px solid #ddd;
      border-radius: 6px;
      padding: .5rem;
      text-align: center;
      position: relative;
    }

    .glyph-tile.verified { border-color: #27ae60; }

    .glyph-tile img {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: #fff;
      border-radius: 3px;
      margin-bottom: .35rem;
      image-rendering: pixelated;
    }

    .glyph-tile input[type="text"] {
      width: 100%;
      padding: .25rem .35rem;
      font-size: .85rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
      background: #fff;
    }

    .glyph-tile .tile-actions {
      display: flex;
      gap: .3rem;
      margin-top: .35rem;
    }

    .glyph-tile .tile-actions button {
      flex: 1;
      border: none;
      border-radius: 4px;
      padding: .2rem 0;
      font-size: .72rem;
      cursor: pointer;
    }

    .btn-verify  { background: #27ae60; color: #fff; }
    .btn-unverify { background: #bbb; color: #fff; }
    .btn-del-g   { background: #e74c3c; color: #fff; }

    #seg-status {
      font-size: .85rem;
      color: #555;
      margin-bottom: 1rem;
      min-height: 1.2em;
    }

    .seg-action-bar {
      display: flex;
      gap: .75rem;
      align-items: center;
      margin-bottom: 1.25rem;
      flex-wrap: wrap;
    }

    .seg-action-bar button {
      padding: .45rem .9rem;
      border: none;
      border-radius: 6px;
      font-size: .85rem;
      cursor: pointer;
    }

    #btn-run-seg   { background: #1a1a2e; color: #fff; }
    #btn-run-seg:hover { background: #2e2e52; }
  </style>
</head>
<body>
  <header>
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h8m-8 4h6"/></svg>
    <h1>font-lab</h1>
  </header>

  <main>
    <!-- Upload form -->
    <div class="card">
      <h2>Upload font sample</h2>
      <form id="upload-form" enctype="multipart/form-data">
        <label for="file">Image *</label>
        <input type="file" id="file" name="file" accept="image/*" required />

        <label for="font_name">Font name</label>
        <input type="text" id="font_name" name="font_name" placeholder="e.g. Helvetica" />

        <label for="font_category">Category</label>
        <select id="font_category" name="font_category">
          <option value="">— select category —</option>
        </select>

        <label for="style">Style</label>
        <select id="style" name="style">
          <option value="">— select style —</option>
        </select>

        <label for="theme">Theme</label>
        <select id="theme" name="theme">
          <option value="">— select theme —</option>
        </select>

        <label for="tags">Tags <small>(comma-separated)</small></label>
        <input type="text" id="tags" name="tags" placeholder="e.g. bold, display, vintage" />

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" placeholder="Any additional observations…"></textarea>

        <button type="submit">Upload</button>
        <p id="msg"></p>
      </form>
    </div>

    <!-- Gallery -->
    <div>
      <div class="card" style="margin-bottom:1rem">
        <h2>Browse fonts</h2>
        <div class="filters">
          <input type="text" id="filter-name" placeholder="Font name…" />
          <input type="text" id="filter-tag" placeholder="Tag…" />
          <select id="filter-cat">
            <option value="">All categories</option>
          </select>
          <select id="filter-style">
            <option value="">All styles</option>
          </select>
          <select id="filter-theme" class="filter-row-full">
            <option value="">All themes</option>
          </select>
          <button onclick="loadSamples()">Search</button>
        </div>
      </div>
      <div id="gallery"></div>
    </div>
  </main>

  <!-- ------------------------------------------------------------------ -->
  <!-- Specimen view overlay (Issues #12 & #13)                           -->
  <!-- ------------------------------------------------------------------ -->
  <div id="specimen-overlay">
    <div id="specimen-panel">
      <button id="specimen-close" title="Close" onclick="closeSpecimen()">×</button>
      <h2 id="sp-title"></h2>
      <div class="sp-meta" id="sp-meta"></div>
      <img id="specimen-img" src="" alt="font specimen" />
      <div id="sp-action-bar">
        <button onclick="openCorrectionFromSpecimen()">✂ Edit glyphs</button>
        <button onclick="openCompareFromSpecimen()">⊞ Compare glyphs</button>
        <button onclick="openPrintPreview()">🖨 Print preview</button>
      </div>
      <div id="specimen-glyphs-section">
        <h3 id="sp-glyph-heading"></h3>
        <div id="specimen-glyph-grid"></div>
      </div>
    </div>
  </div>

  <!-- ------------------------------------------------------------------ -->
  <!-- Glyph correction overlay                                            -->
  <!-- ------------------------------------------------------------------ -->
  <div id="correction-overlay">
    <div id="correction-panel">
      <button id="correction-close" title="Close" onclick="closeCorrection()">×</button>
      <h2 id="cp-title">Glyph Segmentation</h2>
      <p class="subtitle" id="cp-subtitle"></p>

      <div class="seg-action-bar">
        <button id="btn-run-seg" onclick="runSegmentation()">⚙ Run segmentation</button>
        <span id="seg-status"></span>
      </div>

      <!-- Source image with bbox overlays -->
      <div id="source-img-wrap">
        <img id="source-img" src="" alt="font sample" />
      </div>

      <!-- Glyph tiles grid -->
      <div id="glyph-grid"></div>
    </div>
  </div>

  <!-- ------------------------------------------------------------------ -->
  <!-- Compare overlay (Issue #19)                                         -->
  <!-- ------------------------------------------------------------------ -->
  <div id="compare-overlay">
    <div id="compare-panel">
      <button id="compare-close" title="Close" onclick="closeCompare()">×</button>
      <h2 id="cmp-title">Comparison View</h2>
      <p class="subtitle" id="cmp-subtitle">Source crop vs. generated vector outline</p>
      <div id="compare-grid"></div>
    </div>
  </div>

  <script>
    const API = '/api/samples';
    let _currentSampleId = null;
    let _currentGlyphs  = [];
    let _specimenSample = null;

    // -----------------------------------------------------------------------
    // Taxonomy – populate dropdowns
    // -----------------------------------------------------------------------

    async function loadTaxonomy() {
      try {
        const res = await fetch('/api/taxonomy/');
        const tax = await res.json();
        populateSelect('font_category', tax.categories);
        populateSelect('style',         tax.styles);
        populateSelect('theme',         tax.themes);
        populateSelect('filter-cat',    tax.categories, true);
        populateSelect('filter-style',  tax.styles,     true);
        populateSelect('filter-theme',  tax.themes,     true);
      } catch (_) { /* ignore – selects remain empty */ }
    }

    function populateSelect(id, values, withAllOption) {
      const sel = document.getElementById(id);
      if (!sel) return;
      // Keep the first placeholder option, then append taxonomy values
      values.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        sel.appendChild(opt);
      });
    }

    // -----------------------------------------------------------------------
    // Gallery
    // -----------------------------------------------------------------------

    async function loadSamples() {
      const name  = document.getElementById('filter-name').value.trim();
      const cat   = document.getElementById('filter-cat').value;
      const style = document.getElementById('filter-style').value;
      const theme = document.getElementById('filter-theme').value;
      const tag   = document.getElementById('filter-tag').value.trim();

      const params = new URLSearchParams();
      if (name)  params.set('font_name', name);
      if (cat)   params.set('font_category', cat);
      if (style) params.set('style', style);
      if (theme) params.set('theme', theme);
      if (tag)   params.set('tag', tag);

      const res  = await fetch(`${API}/?${params}`);
      const data = await res.json();
      renderGallery(data);
    }

    function renderGallery(samples) {
      const gallery = document.getElementById('gallery');
      if (!samples.length) {
        gallery.innerHTML = '<p class="empty">No samples found.</p>';
        return;
      }
      gallery.innerHTML = samples.map(s => `
        <div class="sample-card" data-id="${s.id}" onclick="openSpecimen(${s.id})">
          <img src="/uploads/${s.filename}" alt="${s.original_filename}" loading="lazy"
               onerror="this.style.display='none'" />
          <button class="seg-btn" title="Segment glyphs" aria-label="Segment glyphs"
                  onclick="event.stopPropagation();openCorrection(${s.id},'${esc(s.font_name || s.original_filename)}','${s.filename}')">✂ Glyphs</button>
          <button class="del-btn" title="Delete" onclick="event.stopPropagation();deleteSample(${s.id})">✕</button>
          <div class="meta">
            <strong title="${s.font_name || s.original_filename}">${s.font_name || s.original_filename}</strong>
            <div class="taxonomy-badges">
              ${s.style    ? `<span class="badge badge-style">${s.style}</span>` : ''}
              ${s.theme    ? `<span class="badge badge-theme">${s.theme}</span>` : ''}
              ${s.font_category ? `<span class="badge badge-cat">${s.font_category}</span>` : ''}
            </div>
            <div>${(s.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
            ${s.notes ? `<span style="font-size:.75rem;color:#555">${s.notes}</span>` : ''}
          </div>
        </div>`).join('');
    }

    document.getElementById('upload-form').addEventListener('submit', async e => {
      e.preventDefault();
      const msg  = document.getElementById('msg');
      const form = e.target;
      msg.textContent = 'Uploading…';
      msg.className = '';

      try {
        const res  = await fetch(`${API}/`, { method: 'POST', body: new FormData(form) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Upload failed');
        msg.textContent = `Uploaded: ${data.original_filename}`;
        msg.className = 'ok';
        form.reset();
        loadSamples();
      } catch (err) {
        msg.textContent = err.message;
        msg.className = 'err';
      }
    });

    async function deleteSample(id) {
      if (!confirm('Delete this sample?')) return;
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      loadSamples();
    }

    // -----------------------------------------------------------------------
    // Specimen view (Issue #13)
    // -----------------------------------------------------------------------

    async function openSpecimen(sampleId) {
      const res = await fetch(`${API}/${sampleId}`);
      if (!res.ok) return;
      const s = await res.json();
      _specimenSample = s;

      document.getElementById('sp-title').textContent = s.font_name || s.original_filename;

      // Build meta row
      const metaParts = [];
      if (s.font_category) metaParts.push(`<span class="badge badge-cat">${s.font_category}</span>`);
      if (s.style)         metaParts.push(`<span class="badge badge-style">${s.style}</span>`);
      if (s.theme)         metaParts.push(`<span class="badge badge-theme">${s.theme}</span>`);
      (s.tags || []).forEach(t => metaParts.push(`<span class="tag">${t}</span>`));
      if (s.notes) metaParts.push(`<span style="color:#555">${s.notes}</span>`);
      document.getElementById('sp-meta').innerHTML = metaParts.join('');

      document.getElementById('specimen-img').src = `/uploads/${s.filename}`;
      document.getElementById('specimen-overlay').classList.add('open');

      // Load glyphs for specimen view
      await loadSpecimenGlyphs(sampleId);
    }

    async function loadSpecimenGlyphs(sampleId) {
      const res = await fetch(`${API}/${sampleId}/glyphs`);
      const glyphs = await res.json();

      const section = document.getElementById('specimen-glyphs-section');
      const heading = document.getElementById('sp-glyph-heading');
      const grid    = document.getElementById('specimen-glyph-grid');

      if (!glyphs.length) {
        heading.textContent = '';
        grid.innerHTML = '<p class="empty">No glyphs extracted yet. Use "Edit glyphs" to segment.</p>';
        return;
      }

      // Sort: verified + labelled first, then by label alphabetically
      glyphs.sort((a, b) => {
        if (a.label && !b.label) return -1;
        if (!a.label && b.label) return 1;
        return (a.label || '').localeCompare(b.label || '');
      });

      heading.textContent = `${glyphs.length} extracted glyph${glyphs.length !== 1 ? 's' : ''}`;
      grid.innerHTML = glyphs.map(g => `
        <div class="sp-glyph-tile${g.verified ? ' verified' : ''}">
          <img src="/uploads/glyphs/${g.filename}" alt="glyph ${g.id}"
               onerror="this.style.opacity='.3'" />
          <div class="sp-label">${esc(g.label || '?')}</div>
        </div>`).join('');
    }

    function closeSpecimen() {
      document.getElementById('specimen-overlay').classList.remove('open');
      _specimenSample = null;
    }

    function openCorrectionFromSpecimen() {
      if (!_specimenSample) return;
      closeSpecimen();
      openCorrection(
        _specimenSample.id,
        _specimenSample.font_name || _specimenSample.original_filename,
        _specimenSample.filename,
      );
    }

    // Close on backdrop click
    document.getElementById('specimen-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('specimen-overlay')) closeSpecimen();
    });

    // -----------------------------------------------------------------------
    // Glyph correction panel
    // -----------------------------------------------------------------------

    async function openCorrection(sampleId, label, filename) {
      _currentSampleId = sampleId;
      document.getElementById('cp-title').textContent   = `Glyph Segmentation — ${label}`;
      document.getElementById('cp-subtitle').textContent = `Sample #${sampleId}`;
      document.getElementById('source-img').src = `/uploads/${filename}`;
      document.getElementById('correction-overlay').classList.add('open');
      document.getElementById('seg-status').textContent = '';
      await loadGlyphs(sampleId);
    }

    function closeCorrection() {
      document.getElementById('correction-overlay').classList.remove('open');
      _currentSampleId = null;
      _currentGlyphs   = [];
    }

    // Close on backdrop click
    document.getElementById('correction-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('correction-overlay')) closeCorrection();
    });

    async function runSegmentation() {
      if (!_currentSampleId) return;
      const status = document.getElementById('seg-status');
      status.textContent = 'Segmenting…';
      try {
        const res = await fetch(`${API}/${_currentSampleId}/segment`, { method: 'POST' });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Segmentation failed');
        status.textContent = `Found ${data.length} glyph(s).`;
        _currentGlyphs = data;
        renderGlyphPanel(data);
      } catch (err) {
        status.textContent = `Error: ${err.message}`;
      }
    }

    async function loadGlyphs(sampleId) {
      const res = await fetch(`${API}/${sampleId}/glyphs`);
      const data = await res.json();
      _currentGlyphs = data;
      const status = document.getElementById('seg-status');
      if (data.length === 0) {
        status.textContent = 'No glyphs yet — run segmentation to extract them.';
      } else {
        status.textContent = `${data.length} glyph(s) extracted.`;
      }
      renderGlyphPanel(data);
    }

    function renderGlyphPanel(glyphs) {
      renderBboxOverlays(glyphs);
      renderGlyphGrid(glyphs);
    }

    // Draw bounding-box overlays on the source image
    function renderBboxOverlays(glyphs) {
      const wrap = document.getElementById('source-img-wrap');
      // Remove old overlays
      wrap.querySelectorAll('.bbox-overlay').forEach(el => el.remove());

      const img = document.getElementById('source-img');
      // Natural dimensions may not be loaded yet – use onload if needed
      function draw() {
        const scaleX = img.clientWidth  / img.naturalWidth;
        const scaleY = img.clientHeight / img.naturalHeight;
        glyphs.forEach(g => {
          const div = document.createElement('div');
          div.className = 'bbox-overlay' + (g.verified ? ' verified' : '');
          div.title = g.label ? `"${g.label}"` : `Glyph #${g.id}`;
          div.style.left   = (g.bbox_x * scaleX) + 'px';
          div.style.top    = (g.bbox_y * scaleY) + 'px';
          div.style.width  = (g.bbox_w * scaleX) + 'px';
          div.style.height = (g.bbox_h * scaleY) + 'px';
          div.onclick = () => scrollToGlyphTile(g.id);
          wrap.appendChild(div);
        });
      }
      if (img.complete && img.naturalWidth) {
        draw();
      } else {
        img.onload = draw;
      }
    }

    function scrollToGlyphTile(glyphId) {
      const tile = document.getElementById(`glyph-tile-${glyphId}`);
      if (tile) tile.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function renderGlyphGrid(glyphs) {
      const grid = document.getElementById('glyph-grid');
      if (!glyphs.length) {
        grid.innerHTML = '<p class="empty" style="grid-column:1/-1">No glyphs yet.</p>';
        return;
      }
      grid.innerHTML = glyphs.map(g => `
        <div class="glyph-tile${g.verified ? ' verified' : ''}" id="glyph-tile-${g.id}">
          <img src="/uploads/glyphs/${g.filename}" alt="glyph ${g.id}"
               onerror="this.style.opacity='.3'" />
          <input type="text" value="${esc(g.label || '')}" placeholder="label"
                 maxlength="4"
                 onchange="saveLabel(${g.id}, this.value)" />
          <div class="spacing-row">
            <div class="spacing-field">
              <label>Adv. width</label>
              <input type="number" min="0" max="2000" placeholder="auto"
                     value="${g.advance_width != null ? g.advance_width : ''}"
                     onchange="saveSpacing(${g.id}, 'advance_width', this.value)" />
            </div>
            <div class="spacing-field">
              <label>L. bearing</label>
              <input type="number" min="0" max="500" placeholder="auto"
                     value="${g.left_bearing != null ? g.left_bearing : ''}"
                     onchange="saveSpacing(${g.id}, 'left_bearing', this.value)" />
            </div>
          </div>
          <div class="tile-actions">
            ${g.verified
              ? `<button class="btn-unverify" onclick="setVerified(${g.id}, false)">✕ unverify</button>`
              : `<button class="btn-verify"   onclick="setVerified(${g.id}, true)">✓ verify</button>`}
            <button class="btn-del-g" aria-label="Delete glyph" onclick="deleteGlyph(${g.id})">🗑</button>
          </div>
        </div>`).join('');
    }

    async function saveLabel(glyphId, label) {
      await fetch(`/api/glyphs/${glyphId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ label: label || null }),
      });
      // Update local state
      const g = _currentGlyphs.find(x => x.id === glyphId);
      if (g) g.label = label || null;
    }

    async function saveSpacing(glyphId, field, rawValue) {
      const value = rawValue === '' ? null : parseInt(rawValue, 10);
      await fetch(`/api/glyphs/${glyphId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ [field]: value }),
      });
      const g = _currentGlyphs.find(x => x.id === glyphId);
      if (g) g[field] = value;
    }

    async function setVerified(glyphId, verified) {
      const res = await fetch(`/api/glyphs/${glyphId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ verified }),
      });
      const updated = await res.json();
      const idx = _currentGlyphs.findIndex(x => x.id === glyphId);
      if (idx !== -1) _currentGlyphs[idx] = updated;
      renderGlyphPanel(_currentGlyphs);
    }

    async function deleteGlyph(glyphId) {
      if (!confirm('Delete this glyph?')) return;
      await fetch(`/api/glyphs/${glyphId}`, { method: 'DELETE' });
      _currentGlyphs = _currentGlyphs.filter(g => g.id !== glyphId);
      document.getElementById('seg-status').textContent = `${_currentGlyphs.length} glyph(s) extracted.`;
      renderGlyphPanel(_currentGlyphs);
    }

    // -----------------------------------------------------------------------
    // Compare view (Issue #19)
    // -----------------------------------------------------------------------

    async function openCompareFromSpecimen() {
      if (!_specimenSample) return;
      closeSpecimen();
      await openCompare(_specimenSample.id, _specimenSample.font_name || _specimenSample.original_filename);
    }

    async function openCompare(sampleId, label) {
      document.getElementById('cmp-title').textContent = `Compare — ${label}`;
      document.getElementById('compare-overlay').classList.add('open');

      const grid = document.getElementById('compare-grid');
      grid.innerHTML = '<p class="cmp-empty">Loading…</p>';

      try {
        const res = await fetch(`${API}/${sampleId}/compare`);
        const entries = await res.json();

        if (!entries.length) {
          grid.innerHTML = '<p class="cmp-empty">No glyphs extracted yet.</p>';
          return;
        }

        grid.innerHTML = entries.map(e => `
          <div class="cmp-tile${e.verified ? ' verified' : ''}">
            <div class="cmp-col-labels">
              <span>Source</span><span>Outline</span>
            </div>
            <div class="cmp-row">
              <div class="cmp-half">
                <img src="${e.source_url}" alt="source ${e.id}"
                     onerror="this.style.opacity='.3'" />
              </div>
              <div class="cmp-half">
                <img src="${e.outline_url}" alt="outline ${e.id}"
                     onerror="this.style.opacity='.3'" />
              </div>
            </div>
            <div class="cmp-label">${esc(e.label || '?')}${e.synthesized ? ' <span title="synthesised" style="color:#888;font-size:.65rem">~</span>' : ''}</div>
          </div>`).join('');
      } catch (err) {
        grid.innerHTML = `<p class="cmp-empty">Error: ${err.message}</p>`;
      }
    }

    function closeCompare() {
      document.getElementById('compare-overlay').classList.remove('open');
    }

    document.getElementById('compare-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('compare-overlay')) closeCompare();
    });

    // -----------------------------------------------------------------------
    // Print preview (Issue #21)
    // -----------------------------------------------------------------------

    function openPrintPreview() {
      if (!_specimenSample) return;
      const text = prompt('Preview text:', 'The quick brown fox');
      if (text === null) return;   // cancelled
      const url = `${API}/${_specimenSample.id}/print-preview?text=${encodeURIComponent(text || 'The quick brown fox')}`;
      window.open(url, '_blank');
    }

    // Escape HTML special chars for inline attribute values
    function esc(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Initial load
    loadTaxonomy();
    loadSamples();
  </script>
</body>
</html>
